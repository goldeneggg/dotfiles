<!DOCTYPE html>
<!--
  repos-onboarder HTML テンプレート（単一ファイル完結）
  使い方:
  - __TITLE__ / __REPO_NAME__ / __SUMMARY__ を置換
  - <nav id="toc"> の <li> を実際の章に合わせて生成（href は各 <section> の id と一致させる）
  - <main> 内の <section> を選んだ章立てに合わせて追加・削除
  - コード引用は <pre><code> を使い、出典を data-src="path:line" で残す
  外部依存なし。ブラウザでそのまま開ける。
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__</title>
<style>
  :root {
    --bg: #fbfbfd; --fg: #1d1d1f; --muted: #6e6e73; --accent: #0066cc;
    --border: #e3e3e8; --code-bg: #f5f5f7; --sidebar-w: 260px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg); background: var(--bg); line-height: 1.7;
  }
  #layout { display: flex; min-height: 100vh; }
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0; border-right: 1px solid var(--border);
    padding: 24px 18px; position: sticky; top: 0; height: 100vh; overflow-y: auto; background: #fff;
  }
  #sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  #toc { list-style: none; padding: 0; margin: 0; }
  #toc li { margin: 4px 0; }
  #toc a { text-decoration: none; color: var(--fg); display: block; padding: 6px 10px; border-radius: 6px; font-size: 14px; }
  #toc a:hover { background: var(--code-bg); color: var(--accent); }
  main { flex: 1; max-width: 820px; padding: 48px 56px; }
  header.doc-head { margin-bottom: 40px; }
  header.doc-head h1 { font-size: 32px; margin: 0 0 8px; }
  header.doc-head .repo { color: var(--muted); font-size: 15px; }
  header.doc-head .summary { margin-top: 16px; font-size: 17px; }
  section { margin-bottom: 48px; scroll-margin-top: 24px; }
  section h2 { font-size: 22px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
  section h3 { font-size: 17px; margin-top: 28px; }
  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; font-size: 13.5px; }
  code { font-family: "SF Mono", Menlo, Consolas, monospace; }
  p code, li code { background: var(--code-bg); padding: 1px 6px; border-radius: 4px; font-size: .9em; }
  pre[data-src]::after { content: "出典: " attr(data-src); display: block; margin-top: 8px; color: var(--muted); font-size: 12px; }
  .note { background: #eef6ff; border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 8px 8px 0; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: 14px; }
  th { background: var(--code-bg); }
</style>
</head>
<body>
<div id="layout">
  <aside id="sidebar">
    <h2>目次</h2>
    <ul id="toc">
      <!-- 章ごとに生成。href は section の id と一致させる -->
      <li><a href="#overview">概要・目的</a></li>
      <li><a href="#architecture">アーキテクチャ全体像</a></li>
      <li><a href="#modules">主要モジュールと責務</a></li>
      <li><a href="#flow">処理フロー</a></li>
      <li><a href="#setup">セットアップ・実行</a></li>
      <li><a href="#next">次に読むべき場所</a></li>
    </ul>
  </aside>

  <main>
    <header class="doc-head">
      <h1>__TITLE__</h1>
      <div class="repo">__REPO_NAME__</div>
      <p class="summary">__SUMMARY__</p>
    </header>

    <!-- 以下、選ばれた章立てに合わせて section を編集 -->
    <section id="overview">
      <h2>概要・目的</h2>
      <p><!-- 何を解決するソフトか、誰のためか --></p>
    </section>

    <section id="architecture">
      <h2>アーキテクチャ全体像</h2>
      <p><!-- 主要コンポーネントと境界、依存の向き --></p>
    </section>

    <section id="modules">
      <h2>主要モジュールと責務</h2>
      <p><!-- コアモジュールの役割 --></p>
    </section>

    <section id="flow">
      <h2>処理フロー</h2>
      <p><!-- 代表ユースケースを入口から出口まで --></p>
      <pre data-src="path:line"><code><!-- 実コード引用 --></code></pre>
    </section>

    <section id="setup">
      <h2>セットアップ・実行</h2>
      <pre><code><!-- 動かし方のコマンド --></code></pre>
    </section>

    <section id="next">
      <h2>次に読むべき場所・落とし穴</h2>
      <p><!-- 学習導線、既知の負債 --></p>
    </section>
  </main>
</div>
</body>
</html>
