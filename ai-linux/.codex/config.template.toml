################################################################################

# Define MCP servers under this table. Leave empty to disable.

################################################################################

[mcp_servers.context7]
command = "docker"
args = ["run", "-i", "--rm", "--init", "-e", "MCP_TRANSPORT=stdio", "mcp/context7:latest"]

[mcp_servers.drawio]
command = "npx"
args = ["-y", "@drawio/mcp"]

# [mcp_servers.chrome-devtools]
